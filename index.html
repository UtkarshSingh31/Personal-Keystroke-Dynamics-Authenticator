<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Typing Behaviour Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #faf9f6;
      --card: #ffffff;
      --text: #111111;
      --muted: #555555;
      --border: #dddddd;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 24px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      font-size: 16px;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-family: system-ui, monospace;
    }

    select {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-top: 10px;
    }

    button {
      background: #000;
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 16px;
    }

    .status {
      font-size: 14px;
      color: var(--muted);
      margin-top: 10px;
    }

    .preview {
      margin-top: 16px;
      padding: 12px;
      background: #f7f7f7;
      border: 1px solid var(--border);
      border-radius: 8px;
      white-space: pre-wrap;
      font-family: monospace;
    }

    .prompt-box {
      margin-top: 10px;
      padding: 12px;
      background: #f3f3f3;
      border-left: 4px solid #000;
      border-radius: 6px;
      font-size: 14px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="card">
    <h2>Typing Behaviour Data Collection</h2>
    <p>
      Please type at your <b>normal typing speed</b> for about <b>1–3 minutes</b>.
      Do not copy-paste.
    </p>

    <label><b>Optional: Choose a question to write about</b></label>
    <select id="questionSelect">
      <option value="">-- Select a question (optional) --</option>
      <option>Tell me about yourself.</option>
      <option>Describe a challenging problem you solved.</option>
      <option>What are your strengths and weaknesses?</option>
      <option>Why did you choose your field of study?</option>
      <option>Explain a project you are proud of.</option>
      <option>Where do you see yourself in 5 years?</option>
      <option>Describe a failure and what you learned.</option>
      <option>How do you handle pressure or deadlines?</option>
      <option>What motivates you to learn new things?</option>
      <option>Explain a technical concept you understand well.</option>
      <option>What is a recent thing you learned?</option>
      <option>Why should someone hire you?</option>
    </select>

    <div class="prompt-box" id="selectedPrompt" style="display:none;"></div>

    <p id="timer" class="status">Time elapsed: 0:00</p>

    <textarea id="box" placeholder="Start typing here..."></textarea>

    <button onclick="submitData()">Submit</button>
    <div id="status" class="status">Typing data is being recorded…</div>

    <h3>Live Preview</h3>
    <div id="preview" class="preview"></div>
  </div>

</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // 🔐 REPLACE THESE
  const SUPABASE_URL = "https://mryfvjiigepemmchtzlb.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeWZ2amlpZ2VwZW1tY2h0emxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyMDA2MTYsImV4cCI6MjA4NTc3NjYxNn0.l6gmbJ4Kg7wmObfN2H3_pi15oD-O45SxH7L-oCo6J4I";

  const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  const userId = Number(prompt("Enter your user ID (same as earlier):"));

  const box = document.getElementById("box");
  const preview = document.getElementById("preview");
  const status = document.getElementById("status");
  const timerEl = document.getElementById("timer");
  const questionSelect = document.getElementById("questionSelect");
  const selectedPrompt = document.getElementById("selectedPrompt");

  let keyDownTime = {};
  let sequence = [];
  let lastRelease = null;
  let typedText = "";
  let startTime = null;
  let timerInterval = null;

  questionSelect.addEventListener("change", () => {
    if (!questionSelect.value) {
      selectedPrompt.style.display = "none";
      return;
    }
    selectedPrompt.style.display = "block";
    selectedPrompt.textContent =
      "Selected question:\n" +
      questionSelect.value +
      "\n\nWrite your answer below in your own words.";
  });

  function startTimer() {
    if (timerInterval) return;

    startTime = performance.now();
    timerInterval = setInterval(() => {
      const seconds = Math.floor((performance.now() - startTime) / 1000);
      timerEl.textContent =
        `Time elapsed: ${Math.floor(seconds/60)}:${String(seconds%60).padStart(2,"0")}`;
    }, 500);
  }

  box.addEventListener("keydown", e => {
    startTimer();
    keyDownTime[e.code] = performance.now();
  });

  box.addEventListener("keyup", e => {
    const press = keyDownTime[e.code];
    if (!press) return;

    const now = performance.now();
    const hold = (now - press) / 1000;
    const flight = lastRelease ? (press - lastRelease) / 1000 : 0;
    lastRelease = now;

    if (e.key === "Backspace") typedText = typedText.slice(0, -1);
    else if (e.key.length === 1) typedText += e.key;
    else if (e.key === "Enter") typedText += "\n";

    preview.textContent = typedText;

    sequence.push({
      key: e.key,
      hold_time: Number(hold.toFixed(4)),
      flight_time: Number(flight.toFixed(4))
    });

    delete keyDownTime[e.code];
  });

  async function submitData() {
    if (sequence.length < 10) {
      alert("Please type more before submitting.");
      return;
    }

    status.textContent = "Submitting…";

    const session_id = crypto.randomUUID();
    const label = userId === 1 ? 1 : 0;

    const { error } = await supabaseClient
      .from("typing_sessions")
      .insert({
        user_id: userId,
        session_id: session_id,
        label: label,
        data: {
          user_id: userId,
          session_id: session_id,
          label: label,
          sequence: sequence,
          text_typed: typedText
        }
      });

    if (error) {
      console.error(error);
      status.textContent = "Submission failed.";
      return;
    }

    status.textContent = "Data submitted successfully.";

    box.value = "";
    preview.textContent = "";
    typedText = "";
    sequence = [];
    lastRelease = null;

    clearInterval(timerInterval);
    timerInterval = null;
    timerEl.textContent = "Time elapsed: 0:00";
  }
</script>

</body>
</html>
